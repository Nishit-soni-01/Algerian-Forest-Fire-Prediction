<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWI Prediction | Algerian Forest Fires</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 50px; max-width: 700px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-header { background-color: #d9534f; color: white; border-radius: 15px 15px 0 0 !important; }
        .btn-primary { background-color: #d9534f; border: none; }
        .btn-primary:hover { background-color: #c9302c; }
        .result-box { margin-top: 20px; padding: 20px; border-radius: 10px; background-color: #e9ecef; text-align: center; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Forest Fire Analysis</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <div class="card-header text-center">
            <h3>Fire Weather Index (FWI) Predictor</h3>
        </div>
        <div class="card-body">
            <form action="{{ url_for('predict_datapoint') }}" method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Temperature (°C)</label>
                        <input type="number" step="any" name="Temperature" class="form-control" placeholder="e.g. 30" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Relative Humidity (%)</label>
                        <input type="number" step="any" name="RH" class="form-control" placeholder="e.g. 50" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Wind Speed (km/h)</label>
                        <input type="number" step="any" name="Ws" class="form-control" placeholder="e.g. 15" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Rain (mm)</label>
                        <input type="number" step="any" name="Rain" class="form-control" placeholder="e.g. 0.1" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">FFMC Index</label>
                        <input type="number" step="any" name="FFMC" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">DMC Index</label>
                        <input type="number" step="any" name="DMC" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">ISI Index</label>
                        <input type="number" step="any" name="ISI" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Classes (0 or 1)</label>
                        <select name="Classes" class="form-select" required>
                            <option value="0">Not Fire</option>
                            <option value="1">Fire</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Region (0 or 1)</label>
                        <select name="Region" class="form-select" required>
                            <option value="0">Bejaia</option>
                            <option value="1">Sidi Bel-abbes</option>
                        </select>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Predict FWI</button>
                </div>
            </form>

            {% if result is not none %}
            <div class="result-box">
                <h4>The Predicted FWI Value is:</h4>
                <h2 class="text-danger">{{ result | round(2) }}</h2>
            </div>
            {% endif %}
        </div>
    </div>
</div>

</body>
</html>
